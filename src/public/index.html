<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Status - Rafi Hasan</title>
    <style>
      /* পুরো পেজের ব্যাকগ্রাউন্ড (Dark Theme) */
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #0f172a; /* গাঢ় নীল/কালো */
        font-family: 'Consolas', 'Courier New', monospace;
      }

      /* কোড এডিটরের বক্স */
      .editor-window {
        background-color: #1e293b; /* এডিটরের ভেতরের কালার */
        width: 90%;
        max-width: 750px;
        border-radius: 10px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        animation: fadeIn 1s ease-in-out;
        border: 1px solid #334155;
      }

      /* ম্যাকবুকের মতো উপরের ৩টি ডট */
      .top-bar {
        background-color: #0f172a;
        padding: 12px 15px;
        display: flex;
        gap: 8px;
        border-bottom: 1px solid #334155;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .dot.red {
        background-color: #ff5f56;
      }
      .dot.yellow {
        background-color: #ffbd2e;
      }
      .dot.green {
        background-color: #27c93f;
      }

      /* কোড লেখার এরিয়া */
      .code-content {
        padding: 20px 30px;
        color: #f8f8f2;
        font-size: 16px;
        line-height: 1.6;
        overflow-x: auto;
      }

      /* সিনট্যাক্স হাইলাইটিং (কালারগুলো আপনার ছবির মতো) */
      .pink {
        color: #ff79c6;
      }
      .cyan {
        color: #8be9fd;
      }
      .yellow {
        color: #f1fa8c;
      }
      .green {
        color: #50fa7b;
      }
      .orange {
        color: #ffb86c;
      }
      .comment {
        color: #6272a4;
        font-style: italic;
      }
      button {
        background-color: #00ff00;
        color: #121212;
        border: none;
        padding: 10px 20px;
        font-size: 14px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
        transition: background 0.3s ease;
      }
      button:hover {
        background-color: #33ff33;
      }
      /* সিম্পল ফেড ইন অ্যানিমেশন */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="editor-window">
      <!-- Top Bar with Mac dots -->
      <div class="top-bar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>

      <!-- The Code inside -->
      <div class="code-content">
        <pre>
<span class="comment">// 🚀 Server Status: Online & Running Successfully!</span>

<span class="pink">const</span> server <span class="pink">=</span> {
  project_name: <span class="green">'Muslim Habit Builder'</span>,
  status: <span class="pink">'success'</span>,
  success: <span class="pink">true</span>,
  code: <span class="pink">200</span>,
};
</pre>

        <form action="/" method="get">
          <button type="submit">🔄 Refresh Status</button>
        </form>
      </div>
    </div>
  </body>
</html>
